<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">

    <h2>Registrar gasto</h2>

    <form method="POST" class="card p-4 shadow-sm">
        {% csrf_token %}

        <input class="form-control mb-2" type="text" name="descripcion" placeholder="Descripción">

        <input class="form-control mb-2" type="number" name="monto" placeholder="Monto">

        <input class="form-control mb-3" type="date" name="fecha">

        <button class="btn btn-primary">Guardar</button> <br>
        <a class="btn btn-secondary" href="{% url 'lista' %}">Cancelar y volver atras</a>
    
    </form>

</div>
