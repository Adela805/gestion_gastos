<!DOCTYPE html>
<html>
<head>
    <title>Editar gasto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">🎆 Editar gasto</h2>

    <form method="POST" class="card p-4 shadow-sm">
        {% csrf_token %}

        <label>Descripción</label>
        <input class="form-control mb-2" type="text" name="descripcion" value="{{ gasto.descripcion }}">

        <label>Monto</label>
        <input class="form-control mb-2" type="number" name="monto" value="{{ gasto.monto }}">

        <label>Fecha</label>
        <input class="form-control mb-3" type="date" name="fecha" value="{{ gasto.fecha|date:'Y-m-d' }}">

        <button class="btn btn-primary">Guardar cambios</button> <br>
        <a class="btn btn-secondary" href="{% url 'lista' %}">Cancelar y volver atras</a>

    </form>

</div>

</body>
</html>
